<div class="shell">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>

  <header class="glass bar">
    <span class="logo"><span class="mark">🜂</span> blaze<b>writ</b></span>
    <nav class="views" aria-label="Primary">
      <a routerLink="/canvas" routerLinkActive="on" ariaCurrentWhenActive="page">Canvas</a>
      <a routerLink="/board" routerLinkActive="on" ariaCurrentWhenActive="page">Board</a>
      <a routerLink="/feedback" routerLinkActive="on" ariaCurrentWhenActive="page">피드백</a>

  <main #main class="stage" id="main-content" tabindex="-1">
    <router-outlet />
  </main>

  <app-question-drawer />
  <app-chat-dock />
