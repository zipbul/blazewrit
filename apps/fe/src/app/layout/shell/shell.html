<div class="shell">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>

  <header class="glass bar">
    <span class="logo"><span class="mark">🜂</span> blaze<b>writ</b></span>
    <nav class="views" aria-label="Primary">
      <a routerLink="/canvas" routerLinkActive="on" ariaCurrentWhenActive="page">Canvas</a>
      <a routerLink="/board" routerLinkActive="on" ariaCurrentWhenActive="page">Board</a>
    </nav>
    <span class="live">
      @if (pending() > 0) {
        <button type="button" class="qbadge" (click)="openQuestions()">질문 {{ pending() }}</button>
      }
      <span class="dot"></span>{{ liveAgents() }} agents 작업 중 · ⌘K
    </span>
  </header>

  <form class="composer glass" (submit)="$event.preventDefault(); submitIntent(q.value); q.value = ''">
    <input
      #q
      class="prompt"
      type="text"
      name="intent"
      autocomplete="off"
      placeholder="작업 의도를 입력하세요 — blazewrit이 분석해 알맞은 프로젝트로 배정합니다…"
      aria-label="Center prompt" />
    <button type="submit" class="run">실행</button>
  </form>

  @if (loadError(); as err) {
    <div class="error-banner" role="alert">⚠ {{ err }}</div>
  }

  <main #main class="stage" id="main-content" tabindex="-1">
    <router-outlet />
  </main>

  <app-question-drawer />

  <footer class="glass status">
    @for (c of connections(); track c.projectId) {
      <span class="s">
        <span class="b" role="img" [attr.aria-label]="c.projectId + ': ' + c.status"
              [class.ok]="c.status === 'connected'" [class.down]="c.status === 'disconnected'"></span>{{ c.projectId }}
      </span>
    }
    <button type="button" class="s linkish" [class.warn]="pending() > 0" (click)="openQuestions()">⚑ {{ pending() }} 질문 대기</button>
    <span class="cmdk">⌘K</span>
  </footer>
</div>
